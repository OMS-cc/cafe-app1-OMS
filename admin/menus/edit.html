<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>메뉴 수정 | ORBIT CAFE</title><link rel="stylesheet" href="../../css/variables.css"><link rel="stylesheet" href="edit.css"></head>
<body><div class="admin-shell"><aside class="sidebar"><a class="brand" href="../index.html"><span class="brand-mark">O</span><span>ORBIT<br>CAFE</span></a><nav class="side-nav" aria-label="관리자 메뉴"><a href="../index.html"><i data-lucide="layout-dashboard"></i>대시보드</a><a class="is-active" href="list.html"><i data-lucide="coffee"></i>메뉴 관리</a><a href="../orders/list.html"><i data-lucide="receipt-text"></i>주문 관리</a></nav><div class="sidebar-user"><span class="avatar">M</span><span><strong>Manager</strong><small>매장 관리자</small></span></div></aside><main class="main-content"><a class="back-link" id="back-link" href="list.html"><i data-lucide="arrow-left"></i>메뉴 목록</a><header class="form-heading"><p class="eyebrow">EDIT ITEM</p><h1>메뉴 수정</h1><p>변경한 내용은 주문 화면에 바로 반영됩니다.</p></header><form id="menu-form" class="form-card" hidden><div class="form-grid"><label>메뉴 이름<input name="name" required maxlength="40"></label><label>카테고리<select name="categoryId" id="category" required></select></label><label>판매 가격<input name="price" required type="number" min="1" step="100"></label><label>메뉴 사진 URL<input name="image" type="url" placeholder="https://..."></label><label class="wide">메뉴 설명<textarea name="description" rows="4" maxlength="160"></textarea></label></div><fieldset><legend>판매 옵션</legend><div class="check-row"><label><input type="checkbox" name="hot"> HOT</label><label><input type="checkbox" name="iced"> ICED</label><label><input type="checkbox" name="regular"> Regular</label><label><input type="checkbox" name="large"> Large</label></div></fieldset><label class="switch-row"><span><strong>판매 상태</strong><small>즉시 주문 화면에 노출합니다.</small></span><input type="checkbox" name="isAvailable"><span class="switch"></span></label><p id="form-error" class="form-error" role="alert"></p><div class="form-actions"><a class="button button-secondary" id="cancel-link" href="list.html">취소</a><button class="button button-primary" type="submit"><i data-lucide="check"></i>변경 사항 저장</button></div></form><section id="not-found" class="not-found" hidden><i data-lucide="circle-alert"></i><strong>수정할 메뉴를 찾을 수 없습니다.</strong><a class="button button-primary" href="list.html">목록으로 돌아가기</a></section></main></div><script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script><script src="../../js/data.js"></script><script src="../../js/utils.js"></script><script src="../../js/bgm.js"></script><script src="edit.js"></script></body></html>
